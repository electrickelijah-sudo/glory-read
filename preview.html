<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>✦ Glory Read ✦</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%}
body{
  overflow:hidden;
  background:#080820;
  cursor:none;
  font-family:Inter,ui-rounded,"SF Pro Rounded",system-ui,-apple-system,sans-serif;
}
canvas{display:block}

#atmosphere{
  position:fixed;inset:0;z-index:8;pointer-events:none;
  background:
    radial-gradient(circle at 18% 16%,rgba(94,234,212,.18),transparent 24%),
    radial-gradient(circle at 78% 18%,rgba(251,113,133,.16),transparent 26%),
    radial-gradient(circle at 50% 78%,rgba(251,191,36,.13),transparent 32%),
    linear-gradient(135deg,rgba(8,8,32,.1),rgba(91,33,182,.14));
  mix-blend-mode:screen;
  animation:aurora 18s ease-in-out infinite alternate;
}
@keyframes aurora{
  from{filter:hue-rotate(0deg) saturate(1);transform:scale(1)}
  to{filter:hue-rotate(18deg) saturate(1.22);transform:scale(1.04)}
}

#vignette{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 50% 48%,transparent 42%,rgba(2,6,23,.28) 68%,rgba(2,6,23,.74) 100%),
    linear-gradient(to bottom,rgba(255,255,255,.03),transparent 24%,rgba(0,0,0,.18));
  z-index:9;pointer-events:none
}

#sound-label{
  position:fixed;top:28px;left:50%;transform:translateX(-50%);
  color:rgba(255,249,230,.9);
  font:800 13px/1 ui-rounded,"SF Pro Rounded",system-ui,-apple-system,sans-serif;
  letter-spacing:7px;text-transform:uppercase;
  z-index:11;user-select:none;pointer-events:none;
  transition:opacity .8s ease,transform .8s ease;
  background:linear-gradient(135deg,rgba(255,255,255,.13),rgba(255,255,255,.045));
  border:1px solid rgba(255,216,102,.24);
  box-shadow:0 10px 35px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.18);
  padding:10px 26px;border-radius:999px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  text-shadow:0 0 16px rgba(255,216,102,.38)
}

#progress{
  position:fixed;bottom:24px;right:28px;
  color:rgba(255,255,255,.24);
  font:700 11px/1 ui-rounded,"SF Pro Rounded",system-ui,sans-serif;
  letter-spacing:3px;
  z-index:11;user-select:none;pointer-events:none
}

#hint{
  position:fixed;bottom:24px;left:0;right:0;
  text-align:center;
  color:rgba(255,249,230,.32);
  font:750 11px/1.4 ui-rounded,"SF Pro Rounded",system-ui,sans-serif;
  letter-spacing:4px;text-transform:uppercase;
  z-index:11;user-select:none;pointer-events:none;
  transition:opacity 2.5s ease;
  text-shadow:0 0 18px rgba(255,216,102,.32)
}

#loading{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;
  color:rgba(255,249,230,.58);
  font:800 12px/1.4 ui-rounded,"SF Pro Rounded",system-ui,sans-serif;
  letter-spacing:7px;text-transform:uppercase;
  z-index:20;user-select:none;pointer-events:none;
  transition:opacity 1.5s ease;
  text-shadow:0 0 24px rgba(255,216,102,.48)
}
#loading span{font-size:30px;letter-spacing:10px;color:#ffd866}
</style>
</head>
<body>

<div id="loading"><span>✦</span>Loading</div>
<div id="atmosphere"></div>
<div id="vignette"></div>
<div id="sound-label"></div>
<div id="progress"></div>
<div id="hint">tap for next word</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { FontLoader } from 'three/addons/loaders/FontLoader.js';
import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ─── Setup ───────────────────────────────────────────────
const canvas = document.createElement('canvas');
document.body.prepend(canvas);

const renderer = new THREE.WebGLRenderer({
  canvas, antialias: true, powerPreference: "high-performance",
});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.16;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();

// Gradient background (animated storybook-night palette)
const bgCanvas = document.createElement('canvas');
bgCanvas.width = 16; bgCanvas.height = 512;
const bgCtx = bgCanvas.getContext('2d');
const bgTex = new THREE.CanvasTexture(bgCanvas);
scene.background = bgTex;

function updateBackground(t) {
  const s1 = Math.sin(t * 0.045) * 12;
  const s2 = Math.sin(t * 0.033 + 1.5) * 10;
  const s3 = Math.sin(t * 0.026 + 3) * 8;
  const g = bgCtx.createLinearGradient(0, 0, 16, 512);
  g.addColorStop(0, `rgb(${Math.round(4+s1*.15)},${Math.round(10+s2*.2)},${Math.round(46+s2)})`);
  g.addColorStop(.28, `rgb(${Math.round(18+s2)},${Math.round(18+s1*.25)},${Math.round(72+s3)})`);
  g.addColorStop(.58, `rgb(${Math.round(42+s3)},${Math.round(16+s2*.2)},${Math.round(70+s1*.25)})`);
  g.addColorStop(.82, `rgb(${Math.round(10+s2*.35)},${Math.round(48+s3*.45)},${Math.round(70+s1*.2)})`);
  g.addColorStop(1, `rgb(${Math.round(5+s1*.12)},${Math.round(8+s2*.15)},${Math.round(28+s3*.2)})`);
  bgCtx.fillStyle = g; bgCtx.fillRect(0, 0, 16, 512);

  const glow = bgCtx.createRadialGradient(8, 318 + Math.sin(t * .04) * 34, 10, 8, 330, 270);
  glow.addColorStop(0, 'rgba(255,216,102,.25)');
  glow.addColorStop(.35, 'rgba(94,234,212,.12)');
  glow.addColorStop(1, 'rgba(255,255,255,0)');
  bgCtx.fillStyle = glow; bgCtx.fillRect(0, 0, 16, 512);
  bgTex.needsUpdate = true;
}

const camera = new THREE.PerspectiveCamera(44, innerWidth/innerHeight, .1, 200);
camera.position.set(0, 0, 10);

// ─── Environment ─────────────────────────────────────────
updateBackground(0);

const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
scene.environment = pmrem.fromScene(new RoomEnvironment(), .02).texture;

// ─── Resize ──────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// ─── Fullscreen ──────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement)
      document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});
document.addEventListener('dblclick', () => {
  if (!document.fullscreenElement)
    document.documentElement.requestFullscreen();
});

// ─── Post-Processing ─────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  .46, .72, .01
);
composer.addPass(bloom);

// ─── Stars ───────────────────────────────────────────────
const STAR_COLORS = [
  [.6, .8, 1], // blue
  [1, .6, .8], // pink
  [1, .8, .5], // orange
  [.7, 1, .7], // green
  [.9, .7, 1], // purple
  [1, .9, .6], // yellow
];

function starField(count, spread, size, color, opacity) {
  const p = new Float32Array(count * 3);
  const c = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const t = Math.random() * Math.PI * 2;
    const ph = Math.acos(2 * Math.random() - 1);
    const r = spread[0] + Math.random() * spread[1];
    p[i*3]=r*Math.sin(ph)*Math.cos(t);
    p[i*3+1]=r*Math.cos(ph)*.3;
    p[i*3+2]=r*Math.sin(ph)*Math.sin(t);
    if (Math.random() < 0.2) {
      const sc = STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];
      c[i*3]=sc[0];c[i*3+1]=sc[1];c[i*3+2]=sc[2];
    } else {
      const w = .3+Math.random()*.7;
      c[i*3]=w;c[i*3+1]=w*(.6+Math.random()*.4);c[i*3+2]=w;
    }
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(p, 3));
  g.setAttribute('color', new THREE.BufferAttribute(c, 3));
  return new THREE.Points(g, new THREE.PointsMaterial({
    size, vertexColors: true, transparent: true, opacity,
    blending: THREE.AdditiveBlending, sizeAttenuation: true, depthWrite: false,
  }));
}
scene.add(starField(2000, [12, 70], .05, null, .6));
const t1 = starField(150, [5, 25], .12, null, .5);
const t2 = starField(150, [5, 25], .12, null, .5);
scene.add(t1); scene.add(t2);

// ─── Lighting ────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffeedd, .4));
const key = new THREE.DirectionalLight(0xffffcc, .8);
key.position.set(0, 4, 6); scene.add(key);
const rim = new THREE.DirectionalLight(0xcc88ff, .28);
rim.position.set(-4, -1, 3); scene.add(rim);
const fill = new THREE.PointLight(0x5eead4, .42, 24);
fill.position.set(3.8, -2.4, 5); scene.add(fill);

// ─── Storybook Space Accents ─────────────────────────────
const moonMat = new THREE.MeshStandardMaterial({
  color: 0x20305f, emissive: 0x111a3f, emissiveIntensity: .35,
  roughness: .9, metalness: 0,
});
const moon = new THREE.Mesh(new THREE.SphereGeometry(1.8, 48, 24), moonMat);
moon.position.set(6.2, 2.2, -13); scene.add(moon);
const ringMat = new THREE.MeshBasicMaterial({
  color: 0xffd866, transparent: true, opacity: .14,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
const moonRing = new THREE.Mesh(new THREE.TorusGeometry(2.5, .025, 12, 140), ringMat);
moonRing.position.copy(moon.position); moonRing.rotation.set(1.18, .18, -.42);
scene.add(moonRing);

const stageGlowMat = new THREE.MeshBasicMaterial({
  color: 0x5eead4, transparent: true, opacity: .055,
  blending: THREE.AdditiveBlending, depthWrite: false,
  side: THREE.DoubleSide,
});
const stageGlow = new THREE.Mesh(new THREE.CircleGeometry(4.7, 96), stageGlowMat);
stageGlow.position.set(0, -.15, -1.55); scene.add(stageGlow);

// ─── Color Palette ────────────────────────────────────────
const PALETTE = [
  [0xffd866, 0xffaa22], // gold (warm)
  [0x5eead4, 0x0d9488], // teal (cool)
  [0xfb7185, 0xe11d48], // rose (warm)
  [0x7dd3fc, 0x0284c7], // sky blue (cool)
  [0xfbbf24, 0xd97706], // amber (warm)
  [0xc4b5fd, 0x7c3aed], // violet (cool)
];
let groupColor = PALETTE[0];

// ─── Word System ─────────────────────────────────────────
const WPG = 4;
const FI = 1.2, HOLD = 5, FO = 1.5, GAP = .5;
const CYCLE = FI + HOLD + FO + GAP;

let wordData = [];
let font = null;
let ready = false;
let wg = null, gi = 0, wi = 0, gw = [], ws = 0;

function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

function pickGroup() {
  const g = wordData[gi];
  groupColor = PALETTE[gi % PALETTE.length];
  gw = shuffle(g.words).slice(0, WPG);
  wi = 0;
}

function disposeWord() {
  if (wg) {
    scene.remove(wg);
    wg.traverse(c => {
      if (c.isMesh) {
        c.geometry?.dispose();
        const materials = Array.isArray(c.material) ? c.material : [c.material];
        materials.forEach(m => {
          m?.map?.dispose();
          m?.dispose();
        });
      }
    });
    wg.userData.plateTexture?.dispose();
    wg.userData.plateTexture = null;
    wg = null;
  }
}

function createWord(text, sound) {
  disposeWord();
  wg = new THREE.Group();
  scene.add(wg);

  const sl = document.getElementById('sound-label');
  if (sl) sl.textContent = '✦ ' + sound + ' ✦';

  if (font) {
    const idx = text.indexOf(sound);
    const chars = text.split('');
    const mats = [];
    let redMat = null, xOff = 0, maxY = 0, minY = 0;
    const gap = 0.18;

    chars.forEach((ch, ci) => {
      const isHL = idx >= 0 && ci >= idx && ci < idx + sound.length;
      const mat = new THREE.MeshStandardMaterial({
        color: isHL ? 0xff5a7a : groupColor[0],
        emissive: isHL ? 0xff2448 : groupColor[1],
        emissiveIntensity: isHL ? .34 : .28,
        metalness: .08, roughness: .18, transparent: true, opacity: 0,
      });
      mats.push(mat);
      if (isHL && !redMat) redMat = mat;

      const geo = new TextGeometry(ch, {
        font, size: 2.8, height: .22, curveSegments: 7,
        bevelEnabled: true, bevelThickness: .015, bevelSize: .018, bevelSegments: 2,
      });
      geo.computeBoundingBox();
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.x = xOff;
      wg.add(mesh);

      const sm = new THREE.MeshBasicMaterial({
        color: 0x020617, transparent: true, opacity: .26,
      });
      const sh = new THREE.Mesh(geo.clone(), sm);
      sh.position.copy(mesh.position);
      sh.position.x += .075;
      sh.position.y -= .075;
      sh.position.z -= .16;
      wg.add(sh);
      mats.push(sm);

      const bb = geo.boundingBox;
      if (bb) {
        xOff += (bb.max.x - bb.min.x) + gap;
        if (bb.max.y > maxY) maxY = bb.max.y;
        if (bb.min.y < minY) minY = bb.min.y;
      }
    });

    const hw = xOff / 2, hh = (maxY + minY) / 2;
    wg.children.forEach(c => {
      if (c.isMesh) { c.position.x -= hw; c.position.y -= hh; }
    });

    const plateCanvas = document.createElement('canvas');
    plateCanvas.width = 1024; plateCanvas.height = 256;
    const px = plateCanvas.getContext('2d');
    const pg = px.createLinearGradient(0, 0, 1024, 256);
    pg.addColorStop(0, 'rgba(255,255,255,.06)');
    pg.addColorStop(.5, 'rgba(255,216,102,.13)');
    pg.addColorStop(1, 'rgba(94,234,212,.08)');
    px.fillStyle = pg;
    px.beginPath();
    px.roundRect(28, 34, 968, 188, 82);
    px.fill();
    px.strokeStyle = 'rgba(255,255,255,.18)';
    px.lineWidth = 4; px.stroke();
    const plateTexture = new THREE.CanvasTexture(plateCanvas);
    const plateMat = new THREE.MeshBasicMaterial({
      map: plateTexture, transparent: true, opacity: 0,
      blending: THREE.AdditiveBlending, depthWrite: false,
      side: THREE.DoubleSide,
    });
    const plate = new THREE.Mesh(
      new THREE.PlaneGeometry(Math.max(5.8, xOff + .85), 1.65),
      plateMat
    );
    plate.position.set(0, -.04, -.44);
    wg.add(plate);
    mats.push(plateMat);

    wg.userData.mats = mats;
    wg.userData.redMat = redMat;
    wg.userData.plateTexture = plateTexture;
  }

  wg.position.set(0, 0, 0);
  ws = performance.now() / 1000;
}

function advanceWord() {
  if (!ready || !wg) return;
  wi++;
  if (wi >= gw.length) {
    gi = (gi + 1) % wordData.length;
    pickGroup();
  }
  createWord(gw[wi], wordData[gi].sound);
  const total = wordData.reduce((s, g) => s + Math.min(WPG, g.words.length), 0);
  document.getElementById('progress').textContent =
    String((gi * WPG + wi) % total + 1).padStart(2, '0');
}

window.addEventListener('click', advanceWord);
window.addEventListener('touchstart', e => { e.preventDefault(); advanceWord(); });

// ─── Load ────────────────────────────────────────────────
let dl = false, fl = false;

function start() {
  ready = true;
  const el = document.getElementById('loading');
  if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 1500); }
  pickGroup();
  createWord(gw[0], wordData[gi].sound);
  const total = wordData.reduce((s, g) => s + Math.min(WPG, g.words.length), 0);
  document.getElementById('progress').textContent = '01';
}

fetch('words.json')
  .then(r => r.json())
  .then(d => { wordData = shuffle(d); dl = true; if (fl) start(); })
  .catch(() => {
    wordData = [{sound:'at',words:['bat','cat','hat','mat','rat','sat']}];
    dl = true; if (fl) start();
  });

new FontLoader().load(
  'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json',
  f => { font = f; fl = true; if (dl) start(); },
  undefined,
  () => { fl = true; if (dl) start(); }
);

setTimeout(() => { if (!ready) start(); }, 8000);

// ─── Particles ───────────────────────────────────────────
const pc = 300;
const pp = new Float32Array(pc * 3);
const pcol = new Float32Array(pc * 3);
const pv = [];
for (let i = 0; i < pc; i++) {
  pp[i*3]=(Math.random()-.5)*16;
  pp[i*3+1]=(Math.random()-.5)*10;
  pp[i*3+2]=(Math.random()-.5)*10-3;
  pv.push({vx:(Math.random()-.5)*.0015,vy:.002+Math.random()*.004});
  const sc = STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];
  pcol[i*3]=sc[0]*.5;pcol[i*3+1]=sc[1]*.5;pcol[i*3+2]=sc[2]*.5;
}
const pg = new THREE.BufferGeometry();
pg.setAttribute('position', new THREE.BufferAttribute(pp, 3));
pg.setAttribute('color', new THREE.BufferAttribute(pcol, 3));
const pt = new THREE.Points(pg, new THREE.PointsMaterial({
  size: .04, transparent: true, opacity: .15,
  vertexColors: true,
  blending: THREE.AdditiveBlending, sizeAttenuation: true, depthWrite: false,
}));
scene.add(pt);

function glowTexture() {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const x = c.getContext('2d');
  const g = x.createRadialGradient(32, 32, 0, 32, 32, 32);
  g.addColorStop(0, 'rgba(255,255,255,1)');
  g.addColorStop(.25, 'rgba(255,255,255,.5)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  x.fillStyle = g; x.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
}

// ─── Nebula ──────────────────────────────────────────────
const NC = 8;
const np = new Float32Array(NC * 3);
const nc = new Float32Array(NC * 3);
for (let i = 0; i < NC; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = 3 + Math.random() * 10;
  np[i*3] = Math.cos(a) * r;
  np[i*3+1] = (Math.random() - .5) * 4;
  np[i*3+2] = Math.sin(a) * r - 10;
  const sc = STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];
  nc[i*3] = sc[0]; nc[i*3+1] = sc[1]; nc[i*3+2] = sc[2];
}
const ng = new THREE.BufferGeometry();
ng.setAttribute('position', new THREE.BufferAttribute(np, 3));
ng.setAttribute('color', new THREE.BufferAttribute(nc, 3));
const nebula = new THREE.Points(ng, new THREE.PointsMaterial({
  size: 5, vertexColors: true, transparent: true, opacity: .03,
  blending: THREE.AdditiveBlending, sizeAttenuation: true, depthWrite: false,
  map: glowTexture(),
}));
scene.add(nebula);

// ─── Animation ───────────────────────────────────────────
const clock = new THREE.Clock();
let hh = false;

function eo(t) { return 1 - Math.pow(1 - t, 3); }
function ei(t) { return t * t * t; }
function eob(t) {
  const c = 1.70158;
  return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2);
}

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const now = performance.now() / 1000;

  // ── Word ──
  if (wg && ready) {
    const el = now - ws;
    const cp = el % CYCLE;
    let op = 0, sc = 1, py = 0;

    if (cp < FI) {
      const p = cp / FI;
      op = eo(p);
      sc = eob(p);
      py = -.5 * (1 - eo(p));
    } else if (cp < FI + HOLD) {
      op = 1; sc = 1;
      const ph = (cp - FI) / HOLD;
      py = Math.sin(ph * Math.PI) * .04;
      wg.position.x = Math.sin((cp - FI) * 1.5) * .06;
    } else if (cp < FI + HOLD + FO) {
      const p = (cp - FI - HOLD) / FO;
      op = 1 - ei(p);
      sc = 1 - p * .05;
      py = .04 + p * .4;
    } else {
      op = 0; sc = .95;
      py = .44;
      wg.position.x = 0;
      advanceWord();
    }

    if (wg.userData.mats) {
      wg.userData.mats.forEach(m => { m.opacity = op; });
    }
    wg.position.y = py;
    wg.scale.setScalar(sc);

    // Red pulse during hold
    if (cp >= FI && cp < FI + HOLD && wg.userData.redMat) {
      wg.userData.redMat.emissiveIntensity =
        .2 + Math.sin((cp - FI) * 1.8) * .08;
    }
  }

  // ── Sound label ──
  if (wg && ready) {
    const el = now - ws;
    const cp = el % CYCLE;
    const sl = document.getElementById('sound-label');
    if (sl) {
      if (cp < FI) sl.style.opacity = .3 + eo(cp / FI) * .7;
      else if (cp < FI + HOLD) sl.style.opacity = 1;
      else if (cp < FI + HOLD + FO) {
        const p = (cp - FI - HOLD) / FO;
        sl.style.opacity = 1 - ei(p) * .6;
      } else sl.style.opacity = 0;
    }
  }

  // ── Stars ──
  t1.material.opacity = .4 + Math.sin(t * .6) * .2;
  t2.material.opacity = .4 + Math.sin(t * .6 + 2.5) * .2;

  // ── Particles ──
  const pa = pt.geometry.attributes.position.array;
  for (let i = 0; i < pc; i++) {
    pa[i*3] += pv[i].vx;
    pa[i*3+1] += pv[i].vy;
    if (pa[i*3+1] > 5) { pa[i*3+1] = -4; pa[i*3] = (Math.random()-.5)*14; }
  }
  pt.geometry.attributes.position.needsUpdate = true;

  // ── Background ──
  updateBackground(t);

  // ── Nebula ──
  nebula.rotation.y = t * .012;
  nebula.material.opacity = .025 + Math.sin(t * .03 + 1) * .01;

  // ── Storybook accents ──
  moon.rotation.y = t * .035;
  moonRing.rotation.z = -.42 + Math.sin(t * .08) * .045;
  stageGlow.scale.setScalar(1 + Math.sin(t * .55) * .025);
  stageGlow.material.opacity = .05 + Math.sin(t * .7) * .014;

  // ── Camera ──
  camera.position.x = Math.sin(t * .025) * .15;
  camera.lookAt(0, .1, 0);

  // ── Hint ──
  if (t > 5 && !hh) { hh = true; document.getElementById('hint').style.opacity = '0'; }

  composer.render();
}

setTimeout(() => {
  const el = document.getElementById('loading');
  if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 1500); }
}, 4000);

animate();
</script>
</body>
</html>
