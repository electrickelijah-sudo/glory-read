<script type="module">
import * as THREE from 'three';
import { FontLoader } from 'three/addons/loaders/FontLoader.js';
import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ─── Setup ───────────────────────────────────────────────
const canvas = document.createElement('canvas');
document.body.prepend(canvas);

const renderer = new THREE.WebGLRenderer({
  canvas, antialias: true, powerPreference: "high-performance",
});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();

// Gradient background (animated storybook-night palette)
const bgCanvas = document.createElement('canvas');
bgCanvas.width = 16; bgCanvas.height = 512;
const bgCtx = bgCanvas.getContext('2d');
const bgTex = new THREE.CanvasTexture(bgCanvas);
scene.background = bgTex;

function updateBackground(t) {
  const s1 = Math.sin(t * 0.045) * 8;
  const s2 = Math.sin(t * 0.033 + 1.5) * 6;
  const s3 = Math.sin(t * 0.026 + 3) * 5;
  const g = bgCtx.createLinearGradient(0, 0, 16, 512);
  g.addColorStop(0, `rgb(${Math.round(4+s1*.12)},${Math.round(8+s2*.15)},${Math.round(38+s2)})`);
  g.addColorStop(.28, `rgb(${Math.round(12+s2*.8)},${Math.round(12+s1*.2)},${Math.round(58+s3*.8)})`);
  g.addColorStop(.58, `rgb(${Math.round(28+s3*.6)},${Math.round(10+s2*.15)},${Math.round(55+s1*.2)})`);
  g.addColorStop(.82, `rgb(${Math.round(8+s2*.25)},${Math.round(32+s3*.3)},${Math.round(55+s1*.15)})`);
  g.addColorStop(1, `rgb(${Math.round(4+s1*.1)},${Math.round(6+s2*.1)},${Math.round(22+s3*.15)})`);
  bgCtx.fillStyle = g; bgCtx.fillRect(0, 0, 16, 512);

  const glow = bgCtx.createRadialGradient(8, 318 + Math.sin(t * .04) * 34, 10, 8, 330, 270);
  glow.addColorStop(0, 'rgba(255,216,102,.15)');
  glow.addColorStop(.35, 'rgba(94,234,212,.08)');
  glow.addColorStop(1, 'rgba(255,255,255,0)');
  bgCtx.fillStyle = glow; bgCtx.fillRect(0, 0, 16, 512);
  bgTex.needsUpdate = true;
}

const camera = new THREE.PerspectiveCamera(44, innerWidth/innerHeight, .1, 200);
camera.position.set(0, 0, 10);

// ─── Environment ─────────────────────────────────────────
updateBackground(0);

const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
scene.environment = pmrem.fromScene(new RoomEnvironment(), .02).texture;

// ─── Resize ──────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// ─── Fullscreen ──────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement)
      document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});
document.addEventListener('dblclick', () => {
  if (!document.fullscreenElement)
    document.documentElement.requestFullscreen();
});

// ─── Post-Processing ─────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  .35, .6, .015
);
composer.addPass(bloom);

// ─── Stars ───────────────────────────────────────────────
const STAR_COLORS = [
  [.6, .8, 1], // blue
  [1, .6, .8], // pink
  [1, .8, .5], // orange
  [.7, 1, .7], // green
  [.9, .7, 1], // purple
  [1, .9, .6], // yellow
];

function starField(count, spread, size, color, opacity) {
  const p = new Float32Array(count * 3);
  const c = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const t = Math.random() * Math.PI * 2;
    const ph = Math.acos(2 * Math.random() - 1);
    const r = spread[0] + Math.random() * spread[1];
    p[i*3]=r*Math.sin(ph)*Math.cos(t);
    p[i*3+1]=r*Math.cos(ph)*.3;
    p[i*3+2]=r*Math.sin(ph)*Math.sin(t);
    if (Math.random() < 0.2) {
      const sc = STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];
      c[i*3]=sc[0];c[i*3+1]=sc[1];c[i*3+2]=sc[2];
    } else {
      const w = .3+Math.random()*.7;
      c[i*3]=w;c[i*3+1]=w*(.6+Math.random()*.4);c[i*3+2]=w;
    }
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(p, 3));
  g.setAttribute('color', new THREE.BufferAttribute(c, 3));
  return new THREE.Points(g, new THREE.PointsMaterial({
    size, vertexColors: true, transparent: true, opacity,
    blending: THREE.AdditiveBlending, sizeAttenuation: true, depthWrite: false,
  }));
}
scene.add(starField(2000, [12, 70], .05, null, .6));
const t1 = starField(150, [5, 25], .12, null, .5);
const t2 = starField(150, [5, 25], .12, null, .5);
scene.add(t1); scene.add(t2);

// ─── Lighting ────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffeedd, .4));
const key = new THREE.DirectionalLight(0xffffcc, .8);
key.position.set(0, 4, 6); scene.add(key);
const rim = new THREE.DirectionalLight(0xcc88ff, .28);
rim.position.set(-4, -1, 3); scene.add(rim);
const fill = new THREE.PointLight(0x5eead4, .42, 24);
fill.position.set(3.8, -2.4, 5); scene.add(fill);

// ─── Storybook Space Accents ─────────────────────────────
const moonMat = new THREE.MeshStandardMaterial({
  color: 0x20305f, emissive: 0x111a3f, emissiveIntensity: .35,
  roughness: .9, metalness: 0,
});
const moon = new THREE.Mesh(new THREE.SphereGeometry(1.8, 48, 24), moonMat);
moon.position.set(6.2, 2.2, -13); scene.add(moon);
const ringMat = new THREE.MeshBasicMaterial({
  color: 0xffd866, transparent: true, opacity: .14,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
const moonRing = new THREE.Mesh(new THREE.TorusGeometry(2.5, .025, 12, 140), ringMat);
moonRing.position.copy(moon.position); moonRing.rotation.set(1.18, .18, -.42);
scene.add(moonRing);

const stageGlowMat = new THREE.MeshBasicMaterial({
  color: 0x5eead4, transparent: true, opacity: .055,
  blending: THREE.AdditiveBlending, depthWrite: false,
  side: THREE.DoubleSide,
});
const stageGlow = new THREE.Mesh(new THREE.CircleGeometry(4.7, 96), stageGlowMat);
stageGlow.position.set(0, -.15, -1.55); scene.add(stageGlow);

// ─── Color Palette ────────────────────────────────────────
const PALETTE = [
  [0xf0bb30, 0xcc8800], // gold (warm)
  [0x38cca8, 0x0a7a6f], // teal (cool)
  [0xee5566, 0xbb1133], // rose (warm)
  [0x55b8ee, 0x026ba0], // sky blue (cool)
  [0xe8a020, 0xa86500], // amber (warm)
  [0xae9cf5, 0x6329cc], // violet (cool)
];
let groupColor = PALETTE[0];

// ─── Word System ─────────────────────────────────────────
const WPG = 4;
const FI = 1.2, HOLD = 5, FO = 1.5, GAP = .5;
const CYCLE = FI + HOLD + FO + GAP;

let wordData = [];
let font = null;
let ready = false;
let wg = null, gi = 0, wi = 0, gw = [], ws = 0;

function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

function pickGroup() {
  const g = wordData[gi];
  groupColor = PALETTE[gi % PALETTE.length];
  gw = shuffle(g.words).slice(0, WPG);
  wi = 0;
}

function disposeWord() {
  if (wg) {
    scene.remove(wg);
    wg.traverse(c => {
      if (c.isMesh) {
        c.geometry?.dispose();
        const materials = Array.isArray(c.material) ? c.material : [c.material];
        materials.forEach(m => {
          m?.map?.dispose();
          m?.dispose();
        });
      }
    });
    wg = null;
  }
}

function createWord(text, sound) {
  disposeWord();
  wg = new THREE.Group();
  scene.add(wg);

  const sl = document.getElementById('sound-label');
  if (sl) sl.textContent = '✦ ' + sound + ' ✦';

  if (font) {
    const idx = text.indexOf(sound);
    const chars = text.split('');
    const mats = [];
    let redMat = null, xOff = 0, maxY = 0, minY = 0;
    const gap = 0.18;

    chars.forEach((ch, ci) => {
      const isHL = idx >= 0 && ci >= idx && ci < idx + sound.length;
      const mat = new THREE.MeshStandardMaterial({
        color: isHL ? 0xee4455 : groupColor[0],
        emissive: isHL ? 0xee1133 : groupColor[1],
        emissiveIntensity: isHL ? .4 : .35,
        metalness: .08, roughness: .18, transparent: true, opacity: 0,
      });
      mats.push(mat);
      if (isHL && !redMat) redMat = mat;

      const geo = new TextGeometry(ch, {
        font, size: 2.8, height: .22, curveSegments: 7,
        bevelEnabled: true, bevelThickness: .015, bevelSize: .018, bevelSegments: 2,
      });
      geo.computeBoundingBox();
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.x = xOff;
      wg.add(mesh);

      const sm = new THREE.MeshBasicMaterial({
        color: 0x020617, transparent: true, opacity: .26,
      });
      const sh = new THREE.Mesh(geo.clone(), sm);
      sh.position.copy(mesh.position);
      sh.position.x += .075;
      sh.position.y -= .075;
      sh.position.z -= .16;
      wg.add(sh);
      mats.push(sm);

      const bb = geo.boundingBox;
      if (bb) {
        xOff += (bb.max.x - bb.min.x) + gap;
        if (bb.max.y > maxY) maxY = bb.max.y;
        if (bb.min.y < minY) minY = bb.min.y;
      }
    });

    const hw = xOff / 2, hh = (maxY + minY) / 2;
    wg.children.forEach(c => {
      if (c.isMesh) { c.position.x -= hw; c.position.y -= hh; }
    });

    wg.userData.mats = mats;
    wg.userData.redMat = redMat;
    wg.userData.plateTexture = plateTexture;
  }

  wg.position.set(0, 0, 0);
  ws = performance.now() / 1000;
}

function advanceWord() {
  if (!ready || !wg) return;
  wi++;
  if (wi >= gw.length) {
    gi = (gi + 1) % wordData.length;
    pickGroup();
  }
  createWord(gw[wi], wordData[gi].sound);
  const total = wordData.reduce((s, g) => s + Math.min(WPG, g.words.length), 0);
  document.getElementById('progress').textContent =
    String((gi * WPG + wi) % total + 1).padStart(2, '0');
}

window.addEventListener('click', advanceWord);
window.addEventListener('touchstart', e => { e.preventDefault(); advanceWord(); });

// ─── Load ────────────────────────────────────────────────
let dl = false, fl = false;

function start() {
  ready = true;
  const el = document.getElementById('loading');
  if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 1500); }
  pickGroup();
  createWord(gw[0], wordData[gi].sound);
  const total = wordData.reduce((s, g) => s + Math.min(WPG, g.words.length), 0);
  document.getElementById('progress').textContent = '01';
}

wordData = shuffle(__WORDS); dl = true; if (fl) start();

new FontLoader().load(
  'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json',
  f => { font = f; fl = true; if (dl) start(); },
  undefined,
  () => { fl = true; if (dl) start(); }
);

setTimeout(() => { if (!ready) start(); }, 8000);

// ─── Particles ───────────────────────────────────────────
const pc = 300;
const pp = new Float32Array(pc * 3);
const pcol = new Float32Array(pc * 3);
const pv = [];
for (let i = 0; i < pc; i++) {
  pp[i*3]=(Math.random()-.5)*16;
  pp[i*3+1]=(Math.random()-.5)*10;
  pp[i*3+2]=(Math.random()-.5)*10-3;
  pv.push({vx:(Math.random()-.5)*.0015,vy:.002+Math.random()*.004});
  const sc = STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];
  pcol[i*3]=sc[0]*.5;pcol[i*3+1]=sc[1]*.5;pcol[i*3+2]=sc[2]*.5;
}
const pg = new THREE.BufferGeometry();
pg.setAttribute('position', new THREE.BufferAttribute(pp, 3));
pg.setAttribute('color', new THREE.BufferAttribute(pcol, 3));
const pt = new THREE.Points(pg, new THREE.PointsMaterial({
  size: .04, transparent: true, opacity: .15,
  vertexColors: true,
  blending: THREE.AdditiveBlending, sizeAttenuation: true, depthWrite: false,
}));
scene.add(pt);

function glowTexture() {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const x = c.getContext('2d');
  const g = x.createRadialGradient(32, 32, 0, 32, 32, 32);
  g.addColorStop(0, 'rgba(255,255,255,1)');
  g.addColorStop(.25, 'rgba(255,255,255,.5)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  x.fillStyle = g; x.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
}

// ─── Nebula ──────────────────────────────────────────────
const NC = 8;
const np = new Float32Array(NC * 3);
const nc = new Float32Array(NC * 3);
for (let i = 0; i < NC; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = 3 + Math.random() * 10;
  np[i*3] = Math.cos(a) * r;
  np[i*3+1] = (Math.random() - .5) * 4;
  np[i*3+2] = Math.sin(a) * r - 10;
  const sc = STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];
  nc[i*3] = sc[0]; nc[i*3+1] = sc[1]; nc[i*3+2] = sc[2];
}
const ng = new THREE.BufferGeometry();
ng.setAttribute('position', new THREE.BufferAttribute(np, 3));
ng.setAttribute('color', new THREE.BufferAttribute(nc, 3));
const nebula = new THREE.Points(ng, new THREE.PointsMaterial({
  size: 5, vertexColors: true, transparent: true, opacity: .03,
  blending: THREE.AdditiveBlending, sizeAttenuation: true, depthWrite: false,
  map: glowTexture(),
}));
scene.add(nebula);

// ─── Animation ───────────────────────────────────────────
const clock = new THREE.Clock();
let hh = false;

function eo(t) { return 1 - Math.pow(1 - t, 3); }
function ei(t) { return t * t * t; }
function eob(t) {
  const c = 1.70158;
  return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2);
}

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const now = performance.now() / 1000;

  // ── Word ──
  if (wg && ready) {
    const el = now - ws;
    const cp = el % CYCLE;
    let op = 0, sc = 1, py = 0;

    if (cp < FI) {
      const p = cp / FI;
      op = eo(p);
      sc = eob(p);
      py = -.5 * (1 - eo(p));
    } else if (cp < FI + HOLD) {
      op = 1; sc = 1;
      const ph = (cp - FI) / HOLD;
      py = Math.sin(ph * Math.PI) * .04;
      wg.position.x = Math.sin((cp - FI) * 1.5) * .06;
    } else if (cp < FI + HOLD + FO) {
      const p = (cp - FI - HOLD) / FO;
      op = 1 - ei(p);
      sc = 1 - p * .05;
      py = .04 + p * .4;
    } else {
      op = 0; sc = .95;
      py = .44;
      wg.position.x = 0;
      advanceWord();
    }

    if (wg.userData.mats) {
      wg.userData.mats.forEach(m => { m.opacity = op; });
    }
    wg.position.y = py;
    wg.scale.setScalar(sc);

    // Red pulse during hold
    if (cp >= FI && cp < FI + HOLD && wg.userData.redMat) {
      wg.userData.redMat.emissiveIntensity =
        .2 + Math.sin((cp - FI) * 1.8) * .08;
    }
  }

  // ── Sound label ──
  if (wg && ready) {
    const el = now - ws;
    const cp = el % CYCLE;
    const sl = document.getElementById('sound-label');
    if (sl) {
      if (cp < FI) sl.style.opacity = .3 + eo(cp / FI) * .7;
      else if (cp < FI + HOLD) sl.style.opacity = 1;
      else if (cp < FI + HOLD + FO) {
        const p = (cp - FI - HOLD) / FO;
        sl.style.opacity = 1 - ei(p) * .6;
      } else sl.style.opacity = 0;
    }
  }

  // ── Stars ──
  t1.material.opacity = .4 + Math.sin(t * .6) * .2;
  t2.material.opacity = .4 + Math.sin(t * .6 + 2.5) * .2;

  // ── Particles ──
  const pa = pt.geometry.attributes.position.array;
  for (let i = 0; i < pc; i++) {
    pa[i*3] += pv[i].vx;
    pa[i*3+1] += pv[i].vy;
    if (pa[i*3+1] > 5) { pa[i*3+1] = -4; pa[i*3] = (Math.random()-.5)*14; }
  }
  pt.geometry.attributes.position.needsUpdate = true;

  // ── Background ──
  updateBackground(t);

  // ── Nebula ──
  nebula.rotation.y = t * .012;
  nebula.material.opacity = .025 + Math.sin(t * .03 + 1) * .01;

  // ── Storybook accents ──
  moon.rotation.y = t * .035;
  moonRing.rotation.z = -.42 + Math.sin(t * .08) * .045;
  stageGlow.scale.setScalar(1 + Math.sin(t * .55) * .015);
  stageGlow.material.opacity = .03 + Math.sin(t * .7) * .01;

  // ── Camera ──
  camera.position.x = Math.sin(t * .025) * .15;
  camera.lookAt(0, .1, 0);

  // ── Hint ──
  if (t > 5 && !hh) { hh = true; document.getElementById('hint').style.opacity = '0'; }

  composer.render();
}

setTimeout(() => {
  const el = document.getElementById('loading');
  if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 1500); }
}, 4000);

animate();
</script>
